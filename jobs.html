<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jobs</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

<div class="topBar">

<h2><i class="fa-solid fa-briefcase"></i> Jobs</h2>

</div>
<div class="tabs">

<button class="active" onclick="showTab('new')">
<i class="fa-solid fa-clipboard-list"></i>
New
</button>

<button onclick="showTab('running')">
<i class="fa-solid fa-gears"></i>
Running
</button>

<button onclick="showTab('completed')">
<i class="fa-solid fa-circle-check"></i>
Completed
</button>
</div>

<div id="jobList">

<div class="jobCard">

<div class="jobBadges">

<span class="urgent">🔴 URGENT</span>

<span class="paid">🟢 PAID</span>

</div>

<h3>🧱 রাজমিস্ত্রির কাজ</h3>

<p><i class="fa-solid fa-hashtag"></i> Job ID : SGL-250621-001</p>

<p><i class="fa-solid fa-user"></i> Customer : Ramesh Mahato</p>

<p><i class="fa-solid fa-location-dot"></i> Area : Parsuli</p>

<p><i class="fa-solid fa-calendar-days"></i> Date : 25 June 2026</p>

<p><i class="fa-solid fa-clock"></i> Time : 10:30 AM</p>

<p><i class="fa-solid fa-indian-rupee-sign"></i> ₹1500</p>

<div class="jobButtons">

<button class="detailsBtn">
<i class="fa-solid fa-circle-info"></i>
Details
</button>

<button class="acceptBtn">
<i class="fa-solid fa-check"></i>
Accept
</button>

</div>

</div>

</div>

</div>

</body>

</html>
